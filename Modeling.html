      <div class="video-container" id="parallax-header" style="height: 50vh">

    <script>
      // Parallax effect for video header
      const bgVideo = document.getElementById("bg-video");

      window.addEventListener("scroll", () => {
        const scrolled = window.pageYOffset;
        const parallaxAmount = scrolled * 0.5;
        bgVideo.style.transform = `translateY(${parallaxAmount}px)`;
      });

      // Menu scroll functionality
      document.querySelectorAll(".menu-link").forEach((link) => {
        link.addEventListener("click", (e) => {
          const href = link.getAttribute("href");
          const currentPage =
            window.location.pathname.split("/").pop() || "index.html";

          // If it's the same page, scroll to content
          if (
            href === currentPage ||
            (href === "index.html" && currentPage === "")
          ) {
            e.preventDefault();
            const contentSection = document.querySelector("#gallery");
            if (contentSection) {
              contentSection.scrollIntoView({ behavior: "smooth" });
            }
          }
        });
      });
    </script>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-content">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-image" id="lightbox-img" src="" alt="" />
        <div class="lightbox-title" id="lightbox-title"></div>
        <a class="lightbox-prev" onclick="changeLightboxImage(-1)">&#10094;</a>
        <a class="lightbox-next" onclick="changeLightboxImage(1)">&#10095;</a>
      </div>
    </div>

    <script>
      let currentLightboxIndex = 0;
      const lightboxLinks = document.querySelectorAll(".gallery-link");

      // Open lightbox
      lightboxLinks.forEach((link, index) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          currentLightboxIndex = index;
          openLightbox(index);
        });
      });

      function openLightbox(index) {
        const link = lightboxLinks[index];
        const lightbox = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        const title = document.getElementById("lightbox-title");

        img.src = link.href;
        title.textContent = link.dataset.title;
        lightbox.style.display = "flex";
      }

      function changeLightboxImage(n) {
        currentLightboxIndex += n;
        if (currentLightboxIndex >= lightboxLinks.length) {
          currentLightboxIndex = 0;
        }
        if (currentLightboxIndex < 0) {
          currentLightboxIndex = lightboxLinks.length - 1;
        }
        openLightbox(currentLightboxIndex);
      }

      // Close lightbox
      document
        .querySelector(".lightbox-close")
        .addEventListener("click", () => {
          document.getElementById("lightbox").style.display = "none";
        });

      // Close on background click
      document.getElementById("lightbox").addEventListener("click", (e) => {
        if (e.target.id === "lightbox") {
          document.getElementById("lightbox").style.display = "none";
        }
      });

      // Keyboard navigation
      document.addEventListener("keydown", (e) => {
        if (document.getElementById("lightbox").style.display === "flex") {
          if (e.key === "ArrowLeft") changeLightboxImage(-1);
          if (e.key === "ArrowRight") changeLightboxImage(1);
          if (e.key === "Escape")
            document.getElementById("lightbox").style.display = "none";
        }
      });
    </script>
